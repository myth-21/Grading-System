<!DOCTYPE html>
<html>
<head>
    <title>Student Grading System</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial;
            background: linear-gradient(120deg, #74ebd5, #acb6e5);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            padding: 30px;
            width: 380px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: 600;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #6a82fb;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6a82fb;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a72e8;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Student Grading System</h2>

    <form action="GradeServlet" method="post">

        <label>Student Name</label>
        <input type="text" name="name" placeholder="Enter student name" required>

        <label>Roll Number</label>
        <input type="text" name="roll" placeholder="Enter roll number" required>

        <label>Subject Name</label>
        <input type="text" name="subject" placeholder="Enter subject" required>

        <label>Marks</label>
        <input type="number" name="marks" placeholder="Enter marks (0 - 100)" required>

        <button type="submit">Submit & Calculate Grade</button>
    </form>

    <div class="footer">
        © 2026 | Java Web Mini Project
    </div>
</div>

</body>
</html>
